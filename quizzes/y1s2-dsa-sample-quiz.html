<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Sample Quiz | Study Hub By J</title>
  <style>
    :root{--bg:#020713;--panel:#081123;--blue:#2f84ff;--cyan:#37d5ff;--muted:rgba(255,255,255,.68)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 80% 10%,rgba(47,132,255,.25),transparent 30%),var(--bg);color:white;min-height:100vh;padding:28px}
    .wrap{max-width:900px;margin:auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:24px}.back{color:var(--cyan);text-decoration:none;border:1px solid rgba(55,213,255,.25);padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04)}
    .card{border:1px solid rgba(47,132,255,.24);background:rgba(8,17,35,.78);border-radius:24px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.28)} h1{font-size:clamp(34px,6vw,58px);line-height:1;margin:0} h1 span{color:var(--blue)} p{color:var(--muted);line-height:1.7}
    .q{margin-top:22px;padding:18px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.04)} .q h3{margin:0 0 12px}.options{display:grid;gap:10px}.options button{text-align:left;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#07111f;color:white;cursor:pointer}.options button:hover{border-color:var(--cyan)}.options button.correct{background:rgba(34,197,94,.18);border-color:#22c55e}.options button.wrong{background:rgba(239,68,68,.18);border-color:#ef4444}.explain{display:none;margin-top:12px;color:var(--muted)}.score{margin-top:22px;font-size:24px;font-weight:900;color:var(--cyan)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a href="../study.html" class="back">← Back to Study Hub</a><span>Created by Janidu Sandaruwan</span></div>
    <div class="card">
      <h1>DSA Sample <span>Interactive Quiz</span></h1>
      <p>This is a demo quiz to test the Study Hub system. Replace this file with your real exam quiz later.</p>
      <div id="quiz"></div>
      <div class="score" id="score">Score: 0 / 0</div>
    </div>
  </div>
<script>
const questions=[
  {q:'Which structure follows LIFO?',o:['Queue','Stack','Array','Tree'],a:1,e:'Stack follows Last In First Out.'},
  {q:'Which notation describes worst-case growth?',o:['Big-O','HTML','CSS','SQL'],a:0,e:'Big-O is used to describe algorithm growth.'},
  {q:'Which operation removes an item from a stack?',o:['enqueue','dequeue','pop','insert'],a:2,e:'pop removes the top item from a stack.'},
  {q:'Which structure follows FIFO?',o:['Stack','Queue','Graph','Heap'],a:1,e:'Queue follows First In First Out.'}
];
let score=0, answered=0;
const quiz=document.getElementById('quiz'); const scoreEl=document.getElementById('score');
questions.forEach((item,idx)=>{
  const box=document.createElement('div'); box.className='q';
  box.innerHTML=`<h3>${idx+1}. ${item.q}</h3><div class="options"></div><div class="explain">${item.e}</div>`;
  const opts=box.querySelector('.options');
  item.o.forEach((opt,i)=>{const btn=document.createElement('button');btn.textContent=opt;btn.onclick=()=>{if(box.dataset.done)return;box.dataset.done='1';answered++; if(i===item.a){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');opts.children[item.a].classList.add('correct');} box.querySelector('.explain').style.display='block'; scoreEl.textContent=`Score: ${score} / ${answered}`;};opts.appendChild(btn)});
  quiz.appendChild(box);
});
scoreEl.textContent=`Score: 0 / ${questions.length}`;
</script>
</body>
</html>
